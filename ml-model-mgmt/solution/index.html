<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Model Manager</title>
</head>
<body>
    <nav class="sidebar">
        <h2>Navigation</h2>
        <ul>
            <li id="nav-data">Data Prep</li>
            <li id="nav-model">Model Config</li>
            <li id="nav-inference">Inference</li>
        </ul>
    </nav>
    
    <div id="main">
        <h1>Model Configuration</h1>
        <form onsubmit="runPrediction(event)">
            <select id="model-select">
                <option value="rf">Random Forest</option>
                <option value="lr">Linear Regression</option>
            </select>

            <label for="slider">Hyperparameter:</label>
            <input type="range" id="slider" min="1" max="100">

            <h2>Run Inference</h2>
            <input type="text" id="features" placeholder="e.g. 1,2,3">
            <button type="submit" id="run-btn">Run Prediction</button>
        </form>
        <div id="spinner" style="display:none;">Loading...</div>
        <div id="result"></div>
        <div id="chart-area"><canvas id="myChart"></canvas></div>
    </div>

    <script>
        async function runPrediction(e) {
            e.preventDefault(); 
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('result').innerText = "";
            const features = document.getElementById('features').value.split(',').map(Number);
            
            try {
                const response = await fetch('/api/v1/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({features: features})
                });
                const data = await response.json();
                document.getElementById('result').innerText = `Prediction: ${data.prediction}`;
            } catch (err) {
                document.getElementById('result').innerText = `Error: ${err.message}`;
            } finally {
                document.getElementById('spinner').style.display = 'none';
            }
        }
    </script>
</body>
</html>
