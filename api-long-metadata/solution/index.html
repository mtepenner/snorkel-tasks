<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Metadata Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f6fa; color: #1f2933; }
        .panel { max-width: 720px; margin: 0 auto; background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
        button { margin-top: 1rem; padding: 0.7rem 1rem; border: 0; border-radius: 8px; background: #0f766e; color: white; cursor: pointer; }
        pre { margin-top: 1rem; padding: 1rem; background: #e2e8f0; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Manual PDF Check</h1>
        <p>Upload one PDF and inspect the raw extractor JSON.</p>
        <input type="file" id="pdfInput" accept="application/pdf">
        <div>
            <button id="submitButton" type="button">Extract</button>
        </div>
        <pre id="output">Waiting for upload...</pre>
    </div>

    <script>
        async function uploadPdf() {
            const fileInput = document.getElementById("pdfInput");
            const file = fileInput.files[0];

            if (!file) {
                document.getElementById("output").textContent = "Pick a PDF first.";
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            document.getElementById("output").textContent = "Working...";

            try {
                const response = await fetch("/extract", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                document.getElementById("output").textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById("output").textContent = "Error: " + error.message;
            }
        }

        document.getElementById("submitButton").addEventListener("click", uploadPdf);
    </script>
</body>
</html>
